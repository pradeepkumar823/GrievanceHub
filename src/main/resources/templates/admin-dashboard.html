<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - GrievanceHub</title>
    <!-- Google Fonts line -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Live WebSockets & SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #8b5cf6; 
            --primary-hover: #7c3aed;
            --secondary: #f472b6;
            --bg-base: #0f172a; 
            --card-bg: rgba(30, 41, 59, 0.65); 
            --card-border: rgba(139, 92, 246, 0.15);
            --table-header: rgba(15, 23, 42, 0.95);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --status-pending: #fbbf24;
            --status-progress: #60a5fa;
            --status-resolved: #34d399;
            --status-rejected: #f87171;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

        body {
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            background: #0f172a;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(244, 114, 182, 0.15), transparent 25%);
            background-attachment: fixed;
            color: var(--text-main);
        }

        .dashboard-container {
            width: 95%; max-width: 1500px;
            margin-top: 40px; margin-bottom: 50px;
            animation: slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-box {
            background-color: var(--card-bg);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--card-border);
            padding: 25px 40px; border-radius: 24px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
            margin-bottom: 40px;
            display: flex; justify-content: space-between; align-items: center;
            position: relative; overflow: hidden;
        }
        
        .header-box::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 60%);
            animation: rotateBg 20s linear infinite; z-index: -1;
        }
        @keyframes rotateBg { 100% { transform: rotate(360deg); } }

        h1 {
            font-size: 2.2rem; font-weight: 800;
            background: linear-gradient(135deg, #a78bfa 0%, #f472b6 100%);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em; margin: 0;
            display: flex; align-items: center; gap: 15px;
        }

        /* Analytics Grid */
        .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px; }
        @media (max-width: 900px) { .analytics-grid { grid-template-columns: 1fr; } }
        
        .chart-card {
            background-color: var(--card-bg);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--card-border);
            padding: 30px; border-radius: 24px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
            height: 380px; display: flex; flex-direction: column;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .chart-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -10px rgba(139, 92, 246, 0.2);
            border-color: rgba(139, 92, 246, 0.4);
        }
        .chart-card h3 {
            font-size: 1.1rem; font-weight: 700; color: #e2e8f0; margin-bottom: 25px;
            text-transform: uppercase; letter-spacing: 0.1em;
            display: flex; align-items: center; gap: 10px;
        }
        .chart-container { position: relative; flex-grow: 1; width: 100%; }

        /* Table Box */
        .table-box {
            background-color: var(--card-bg);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0; text-align: left; }
        
        th {
            background-color: var(--table-header); color: var(--text-muted);
            font-weight: 700; text-transform: uppercase; font-size: 0.8rem;
            letter-spacing: 0.1em; padding: 18px 24px; white-space: nowrap;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        td {
            padding: 18px 24px; vertical-align: middle;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.2s;
        }

        tbody tr { transition: all 0.2s; }
        tbody tr:hover { background-color: rgba(255, 255, 255, 0.04); }
        tbody tr:hover td { border-color: transparent; }

        .id-col { font-family: monospace; color: var(--secondary); font-weight: 700; font-size: 1rem; }
        .user-col { font-size: 0.95rem; color: var(--text-muted); }
        .user-col strong { color: var(--text-main); display: block; font-weight: 600; font-size: 1.05rem; }
        
        .badge-secondary {
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.1); display: inline-block;
            color: #cbd5e1; padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 600;
        }

        .status-badge {
            display: inline-flex; padding: 6px 14px; border-radius: 12px;
            font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .status-pending { color: var(--status-pending); background-color: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.4); }
        .status-in_progress { color: var(--status-progress); background-color: rgba(96, 165, 250, 0.1); border: 1px solid rgba(96, 165, 250, 0.4); }
        .status-resolved { color: var(--status-resolved); background-color: rgba(52, 211, 153, 0.1); border: 1px solid rgba(52, 211, 153, 0.4); }
        .status-rejected { color: var(--status-rejected); background-color: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.4); }

        .priority-critical { color: #fca5a5 !important; border-left: 4px solid #f87171;}
        .priority-high { color: #fdba74 !important; border-left: 4px solid #fb923c;}
        .priority-medium { color: var(--status-pending) !important; }
        .priority-low { color: var(--status-resolved) !important; padding-left: 8px; }

        .actions { display: flex; gap: 12px; align-items: center; }

        .view-btn {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(139, 92, 246, 0.05));
            color: #c4b5fd; border: 1px solid rgba(139, 92, 246, 0.4);
            padding: 8px 16px; border-radius: 10px; font-size: 0.85rem; font-weight: 700;
            text-decoration: none; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .view-btn:hover { background: var(--primary); color: white; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4); }

        select {
            background-color: rgba(15, 23, 42, 0.6); color: var(--text-main);
            border: 1px solid rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 10px;
            font-size: 0.85rem; outline: none; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        select:focus, select:hover { border-color: var(--primary); background: rgba(15,23,42,0.9); }

        .quick-update-btn {
            background: rgba(255,255,255,0.05); color: #e2e8f0;
            border: 1px solid rgba(255,255,255,0.1); padding: 8px 14px; border-radius: 10px;
            font-size: 0.85rem; cursor: pointer; transition: all 0.3s; font-weight: 700;
        }
        .quick-update-btn:hover { background: var(--primary); border-color: var(--primary); color: white; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3); }

        .no-data { text-align: center; padding: 100px 20px; color: var(--text-muted); font-size: 1.2rem; font-weight: 500; }
        
        .animated-gradient-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white; padding: 12px 28px; border-radius: 14px; font-weight: 800; text-decoration: none;
            display: inline-flex; align-items: center; gap: 10px; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #34d399; position: relative; overflow: hidden;
        }
        .animated-gradient-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(16, 185, 129, 0.4); }
        .animated-gradient-btn::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg); transition: 0.5s; opacity: 0;
        }
        .animated-gradient-btn:hover::after { opacity: 1; left: 100%; }

        .csv-btn {
            background: rgba(255,255,255,0.03); color: #cbd5e1; border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 28px; border-radius: 14px; font-weight: 800; text-decoration: none;
            display: inline-flex; align-items: center; gap: 10px; transition: all 0.3s;
        }
        .csv-btn:hover { background: rgba(255,255,255,0.1); color: white; border-color: rgba(255,255,255,0.2); transform: translateY(-2px); }
    </style>
</head>
<body>
<div th:replace="~{fragments/admin-navbar :: navbar(activePage='dashboard')}"></div>

<div class="dashboard-container">
    <div class="header-box">
        <h1>
            <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
            Command Center
        </h1>
        <div style="display: flex; gap: 16px;">
            <a th:href="@{/admin/export/csv}" class="csv-btn">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Export CSV
            </a>
            <a th:href="@{/admin/map}" class="animated-gradient-btn">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                Live Heatmap
            </a>
        </div>
    </div>

    <!-- Analytics Dashboard -->
    <div class="analytics-grid" th:if="${totalCount > 0}">
        <div class="chart-card">
            <h3>Complaints by Status</h3>
            <div class="chart-container">
                <canvas id="statusChart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3>Complaints by Department</h3>
            <div class="chart-container">
                <canvas id="deptChart"></canvas>
            </div>
        </div>
    </div>

    <div class="table-box">
        <div th:if="${#lists.isEmpty(complaints)}" class="no-data">
            <p>No complaints found in the system.</p>
        </div>

        <div class="table-responsive" th:if="${!#lists.isEmpty(complaints)}">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tracking ID</th>
                        <th>Title & Dept</th>
                        <th>User</th>
                        <th>Location</th>
                        <th>Status & Priority</th>
                        <th>Submitted At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${complaints}">
                        <td class="id-col" th:text="'#' + ${c.id}">#1</td>
                        <td th:text="${c.trackingId != null ? c.trackingId : 'N/A'}" style="font-family: monospace; font-weight: 600; color: #a5b4fc; letter-spacing: 0.05em;">GRV-...</td>
                        <td>
                            <div style="font-weight: 500;" th:text="${c.title}">Title</div>
                            <span class="badge-secondary" th:text="${c.department != null ? c.department : 'General'}" style="margin-top: 5px; display: inline-block;">Dept</span>
                        </td>
                        <td class="user-col">
                            <strong th:text="${c.user != null ? c.user.name : 'Unknown User'}">Name</strong>
                            <span th:text="${c.user != null ? c.user.email : 'N/A'}">email</span>
                        </td>
                        <td class="loc-col">
                            <span th:text="${c.city} + ', ' + ${c.state}">City, State</span>
                        </td>
                        <td>
                            <span class="status-badge" 
                                  th:text="${c.status}" 
                                  th:classappend="'status-' + ${c.status.toLowerCase()}">
                                PENDING
                            </span>
                            <div th:class="'badge-secondary priority-' + (${c.priority != null ? c.priority.toLowerCase() : 'low'})" th:text="${c.priority != null ? c.priority + ' Priority' : 'Low Priority'}" style="margin-top: 5px; font-weight: bold; width: fit-content;">High</div>
                        </td>
                        <td th:text="${#temporals.format(c.createdAt, 'dd-MMM-yyyy HH:mm')}">date</td>
                        <td>
                            <div class="actions">
                                <a class="view-btn" th:href="@{|/admin/complaint/${c.id}|}">Review</a>
                                
                                <form th:action="@{|/admin/complaint/${c.id}/status|}" method="post" style="display:inline-flex; gap: 5px; margin: 0;">
                                    <input type="hidden" name="adminReply" th:value="${c.adminReply != null ? c.adminReply : ''}" />
                                    <select name="status">
                                        <option value="PENDING" th:selected="${c.status == 'Pending' or c.status == 'PENDING'}">Pending</option>
                                        <option value="IN_PROGRESS" th:selected="${c.status == 'In Progress' or c.status == 'IN_PROGRESS'}">In Progress</option>
                                        <option value="RESOLVED" th:selected="${c.status == 'Resolved' or c.status == 'RESOLVED'}">Resolved</option>
                                        <option value="REJECTED" th:selected="${c.status == 'Rejected' or c.status == 'REJECTED'}">Rejected</option>
                                    </select>
                                    <button class="quick-update-btn" type="submit">Update</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const totalCount = /*[[${totalCount}]]*/ 0;
    
    if (totalCount > 0) {
        const pendingCount = /*[[${pendingCount}]]*/ 0;
        const progressCount = /*[[${progressCount}]]*/ 0;
        const resolvedCount = /*[[${resolvedCount}]]*/ 0;
        const rejectedCount = /*[[${rejectedCount}]]*/ 0;
        const deptStats = /*[[${deptStats}]]*/ {};
        
        // --- Status Doughnut Chart ---
        const ctxStatus = document.getElementById('statusChart').getContext('2d');
        new Chart(ctxStatus, {
            type: 'doughnut',
            data: {
                labels: ['Pending', 'In Progress', 'Resolved', 'Rejected'],
                datasets: [{
                    data: [pendingCount, progressCount, resolvedCount, rejectedCount],
                    backgroundColor: ['#fbbf24', '#60a5fa', '#34d399', '#f87171'],
                    borderWidth: 0,
                    hoverOffset: 5
                }]
            },
            options: {
                plugins: {
                    legend: { position: 'bottom', labels: { color: '#cbd5e1', padding: 20, font: { family: "'Inter', sans-serif" } } }
                },
                cutout: '75%',
                responsive: true,
                maintainAspectRatio: false
            }
        });

        // --- Department Bar Chart ---
        const ctxDept = document.getElementById('deptChart').getContext('2d');
        const deptLabels = Object.keys(deptStats);
        const deptData = Object.values(deptStats);
        
        new Chart(ctxDept, {
            type: 'bar',
            data: {
                labels: deptLabels,
                datasets: [{
                    label: 'Complaints',
                    data: deptData,
                    backgroundColor: '#8b5cf6',
                    borderRadius: 6,
                    barPercentage: 0.6
                }]
            },
            options: {
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: { 
                        beginAtZero: true, 
                        grid: { color: 'rgba(255,255,255,0.05)' }, 
                        ticks: { color: '#94a3b8', stepSize: 1, font: { family: "'Inter', sans-serif" } } 
                    },
                    x: { 
                        grid: { display: false }, 
                        ticks: { color: '#94a3b8', font: { family: "'Inter', sans-serif" } } 
                    }
                },
                responsive: true,
                maintainAspectRatio: false
            }
        });
    }

    // Phase 7: Real-Time WebSockets Client
    document.addEventListener("DOMContentLoaded", () => {
        let socket = new SockJS('/ws-grievance');
        let stompClient = Stomp.over(socket);
        
        // Suppress massive debug logs
        stompClient.debug = null;
        
        stompClient.connect({}, function (frame) {
            console.log('🔗 Connected to Live Command Center Message Streams');
            stompClient.subscribe('/topic/admin-alerts', function (message) {
                let complaint = JSON.parse(message.body);
                
                // Fire Native Toast Notification organically without reload
                const Toast = Swal.mixin({
                    toast: true,
                    position: 'top-end',
                    showConfirmButton: false,
                    timer: 8000,
                    timerProgressBar: true,
                    background: 'var(--card-bg)',
                    color: 'var(--text-main)',
                    didOpen: (toast) => {
                        toast.onmouseenter = Swal.stopTimer;
                        toast.onmouseleave = Swal.resumeTimer;
                    }
                });

                Toast.fire({
                    icon: 'warning',
                    iconColor: '#f87171',
                    title: `🚨 ${complaint.priority} Issue Reported!`,
                    text: `${complaint.department} in ${complaint.city}`,
                });
            });
        }, function(error) {
            console.error('WebSocket connection dropped:', error);
        });
    });
    /*]]>*/
</script>

</body>
</html>
