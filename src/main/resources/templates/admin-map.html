<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Grievance Heatmap - Admin Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background-color: #0f172a; color: white;}
        #map { height: 100vh; width: 100vw; }
        .map-overlay {
            position: absolute;
            top: 20px;
            left: 50px;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.9);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .map-overlay h2 { margin: 0 0 10px 0; font-size: 1.5rem; color: #fca5a5; }
        .back-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            background: #475569;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: 0.2s;
            font-weight: 600;
        }
        .back-btn:hover { background: #64748b; }
        
        .leaflet-popup-content-wrapper {
            background: #1e293b;
            color: #f8fafc;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .leaflet-popup-tip { background: #1e293b; }
        .popup-title { font-weight: bold; color: #fca5a5; font-family: monospace; font-size: 1.1em; border-bottom: 1px solid #334155; padding-bottom: 5px; margin-bottom: 5px;}
        .popup-detail { font-size: 0.85rem; margin-bottom: 3px;}
        .resolve-btn {
            display: block; width: 100%; text-align: center; padding: 8px; margin-top: 12px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; text-decoration: none; border-radius: 6px; font-weight: bold;
            transition: 0.2s;
        }
        .resolve-btn:hover { opacity: 0.9; }
        
        /* Map Legend */
        .legend {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            background: rgba(15,23,42,0.9);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.85rem;
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 8px; }
        .legend-item:last-child { margin-bottom: 0; }
        .legend-color { width: 14px; height: 14px; border-radius: 50%; margin-right: 10px; }
        .c-red { background: #ef4444; }
        .c-yellow { background: #eab308; }
        .c-green { background: #10b981; }
    </style>
</head>
<body>

<div class="map-overlay">
    <h2>Live Infrastructure Heatmap</h2>
    <p style="margin: 0; font-size: 0.9rem; color: #94a3b8;">Real-time spatial view of structural reporting</p>
    <a th:href="@{/admin/dashboard}" class="back-btn">&larr; Return to Dashboard</a>
</div>

<div class="legend">
    <div class="legend-item"><div class="legend-color c-red"></div>Critical / Escalated Issues</div>
    <div class="legend-item"><div class="legend-color c-yellow"></div>Pending / Review Track</div>
    <div class="legend-item"><div class="legend-color c-green"></div>Resolved / Closed Incidents</div>
</div>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
    // Initialize map centered around central India (Nagpur)
    var map = L.map('map').setView([21.1458, 79.0882], 5);

    // Dark theme map tiles (CartoDB Dark Matter)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap contributors &copy; CartoDB',
        subdomains: 'abcd',
        maxZoom: 19
    }).addTo(map);

    // Custom Map Markers dynamically sourced from leaflet repos
    var redIcon = L.icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
    });

    var yellowIcon = L.icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-gold.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
    });

    var greenIcon = L.icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
    });

    // Fetch JSON data dynamically from our new backend Service
    fetch('/admin/api/map-data')
        .then(response => response.json())
        .then(data => {
            data.forEach(c => {
                if (c.latitude && c.longitude) {
                    
                    let iconToUse = yellowIcon; // default
                    
                    if (c.status === 'ESCALATED' || c.priority === 'Critical' || c.priority === 'High') {
                        iconToUse = redIcon;
                    }
                    if (c.status === 'RESOLVED' || c.status === 'Resolved' || c.status === 'Closed') {
                        iconToUse = greenIcon;
                    }

                    var marker = L.marker([c.latitude, c.longitude], {icon: iconToUse}).addTo(map);
                    
                    var popupHtml = `
                        <div class="popup-title">${c.trackingId}</div>
                        <div class="popup-detail" style="margin-top: 8px;"><strong>Issue:</strong> ${c.title}</div>
                        <div class="popup-detail"><strong>Dept:</strong> ${c.department}</div>
                        <div class="popup-detail"><strong>Status:</strong> <span style="color:#fbbf24">${c.status}</span></div>
                        <div class="popup-detail"><strong>Priority:</strong> ${c.priority}</div>
                        <a href="/admin/complaint/${c.id}" class="resolve-btn">Review & Resolve</a>
                    `;
                    
                    marker.bindPopup(popupHtml);
                }
            });
        })
        .catch(err => console.error("Failed to load map data: ", err));
</script>
</body>
</html>
