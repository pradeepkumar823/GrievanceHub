<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile - GrievanceHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B6B;
            --bg: #0f172a;
            --card: rgba(30,41,59,0.7);
            --text: #f8fafc;
            --muted: #94a3b8;
            --border: rgba(255,255,255,0.07);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; }

        /* Extraneous inline navbar CSS removed to allow fragments/admin-navbar to handle responsiveness */

        .container { max-width: 640px; margin: 60px auto; padding: 0 24px; }

        .profile-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            text-align: center;
        }

        .avatar-lg {
            width: 90px; height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B6B, #a855f7);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 2.2rem; font-weight: 800; color: #fff;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(255,107,107,0.3);
        }

        .profile-name { font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; }

        .profile-email { color: var(--muted); font-size: 1rem; margin-bottom: 20px; }

        .badge-admin {
            display: inline-block;
            background: rgba(255,107,107,0.15);
            color: var(--primary);
            border: 1px solid rgba(255,107,107,0.3);
            padding: 5px 18px; border-radius: 20px;
            font-weight: 700; font-size: 0.8rem; letter-spacing: 0.06em;
            margin-bottom: 32px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            text-align: left;
        }
        .info-item {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
        }
        .info-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; margin-bottom: 6px; }
        .info-value { font-size: 0.95rem; font-weight: 600; }

        .btn-back {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), #ef4444);
            color: #fff;
            text-decoration: none;
            padding: 12px 30px; border-radius: 12px;
            font-weight: 600; transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(239,68,68,0.2);
        }
        .btn-back:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(239,68,68,0.4); }

        .btn-secondary {
            display: inline-block;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text);
            text-decoration: none;
            padding: 12px 30px; border-radius: 12px;
            font-weight: 600; transition: all 0.3s;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); opacity: 1; transform: translateY(-2px); }
    </style>
</head>
<body>
<div th:replace="~{fragments/admin-navbar :: navbar(activePage='profile')}"></div>

<div class="container">
    <div class="profile-card">
        <div class="avatar-lg" th:text="${admin != null ? #strings.toUpperCase(#strings.substring(admin.name, 0, 1)) : 'A'}">A</div>
        <div class="profile-name" th:text="${admin != null ? admin.name : 'Administrator'}">Administrator</div>
        <div class="profile-email" th:text="${admin != null ? admin.email : ''}">admin@example.com</div>
        <div class="badge-admin">SYSTEM ADMINISTRATOR</div>

        <div class="info-grid">
            <div class="info-item">
                <div class="info-label">Role</div>
                <div class="info-value" th:text="${admin != null ? admin.role : 'ADMIN'}">ADMIN</div>
            </div>
            <div class="info-item">
                <div class="info-label">Account Status</div>
                <div class="info-value" style="color: #22c55e;">
                    <span th:if="${admin != null and admin.enabled}">✅ Active</span>
                    <span th:if="${admin == null or !admin.enabled}" style="color: #ef4444;">❌ Inactive</span>
                </div>
            </div>
            <div class="info-item" style="grid-column: span 2;">
                <div class="info-label">Email Address</div>
                <div class="info-value" th:text="${admin != null ? admin.email : '—'}">admin@example.com</div>
            </div>
        </div>

        <div style="display: flex; gap: 16px; justify-content: center; margin-top: 32px; flex-wrap: wrap;">
            <a th:href="@{/admin/dashboard}" class="btn-secondary">← Back to Dashboard</a>
            <a th:href="@{/logout}" class="btn-back">Sign Out / Disconnect ⏻</a>
        </div>
        
    </div>
</div>
</body>
</html>
