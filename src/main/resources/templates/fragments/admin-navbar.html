<nav class="admin-nav" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="navbar(activePage)">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        
        .admin-nav {
            padding: 16px 40px;
            background: linear-gradient(90deg, rgba(15,23,42,0.95) 0%, rgba(30,27,75,0.95) 100%);
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
            width: 100%;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            font-family: 'Outfit', sans-serif;
            margin: 0 !important;
        }
        .nav-brand {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #f8fafc;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .nav-brand span.highlight {
            background: linear-gradient(135deg, #a78bfa 0%, #f472b6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-badge {
            font-size: 0.65rem;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.2), rgba(244, 114, 182, 0.2));
            color: #f472b6;
            padding: 4px 10px;
            border-radius: 8px;
            border: 1px solid rgba(244, 114, 182, 0.3);
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(244, 114, 182, 0.1);
        }
        .nav-menu {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .nav-item {
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 8px 16px;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
        }
        .nav-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(244, 114, 182, 0.1));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }
        .nav-item:hover::before { opacity: 1; }
        .nav-item:hover {
            color: #ffffff;
            transform: translateY(-2px);
        }
        .nav-item.active {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .nav-item.map { color: #fca5a5; }
        .nav-item.map:hover {
            color: #ef4444;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }
        .nav-lang {
            display: flex;
            gap: 10px;
            margin-right: 15px;
            padding-right: 20px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-lang a {
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .nav-lang a:hover {
            color: #ffffff;
            background: rgba(255,255,255,0.1);
        }
        .nav-logout {
            background: linear-gradient(135deg, rgba(248, 113, 113, 0.1), rgba(220, 38, 38, 0.2));
            color: #fca5a5;
            border: 1px solid rgba(248, 113, 113, 0.3);
            padding: 8px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-decoration: none;
            margin-left: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-logout:hover {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: #ffffff;
            border-color: #ef4444;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
            transform: translateY(-2px);
        }

        .mobile-toggle {
            display: none;
            background: none;
            border: none;
            color: #f8fafc;
            cursor: pointer;
            padding: 5px;
            transition: transform 0.3s ease;
        }
        .mobile-toggle:hover {
            transform: scale(1.1);
        }

        @media (max-width: 992px) {
            .admin-nav {
                padding: 14px 20px;
            }
            .mobile-toggle {
                display: block;
            }
            .nav-menu {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: rgba(15, 23, 42, 0.98);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                flex-direction: column;
                align-items: stretch;
                padding: 15px 20px 25px 20px;
                gap: 8px;
                border-bottom: 1px solid rgba(139, 92, 246, 0.2);
                box-shadow: 0 15px 30px rgba(0,0,0,0.6);
            }
            .nav-menu.show {
                display: flex;
                animation: slideDown 0.3s ease forwards;
            }
            @keyframes slideDown {
                from { opacity: 0; transform: translateY(-10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .nav-lang {
                border-right: none !important;
                border-bottom: 1px solid rgba(255,255,255,0.1);
                padding-right: 0 !important;
                padding-bottom: 15px;
                margin-right: 0 !important;
                justify-content: center;
                margin-bottom: 10px;
            }
            .nav-item {
                justify-content: flex-start;
                padding: 12px 16px;
            }
            .nav-logout {
                justify-content: center;
                margin-top: 10px;
                margin-left: 0;
                padding: 12px 16px;
            }
        }
    </style>

    <a th:href="@{/home}" class="nav-brand">
        Grievance<span class="highlight">Hub</span>
        <span class="nav-badge">Command</span>
    </a>
    
    <button class="mobile-toggle" onclick="this.nextElementSibling.classList.toggle('show')" aria-label="Toggle Menu">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>
    
    <div class="nav-menu">
        <div class="nav-lang">
            <a href="?lang=en">EN</a>
            <a href="?lang=hi">HI</a>
        </div>
        
        <a th:href="@{/admin/dashboard}" class="nav-item" th:classappend="${activePage == 'dashboard' ? 'active' : ''}">
            <svg style="margin-right: 6px;" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"></rect><rect x="14" y="3" width="7" height="5" rx="1"></rect><rect x="14" y="12" width="7" height="9" rx="1"></rect><rect x="3" y="16" width="7" height="5" rx="1"></rect></svg>
            <span th:text="#{nav.command}">Dashboard</span>
        </a>
        
        <a th:href="@{/admin/map}" class="nav-item map" th:classappend="${activePage == 'map' ? 'active' : ''}">
            <svg style="margin-right: 6px;" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            <span th:text="#{nav.map}">Live Map</span>
        </a>
        
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/users}" class="nav-item" th:classappend="${activePage == 'users' ? 'active' : ''}">
            <svg style="margin-right: 6px;" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            <span th:text="#{nav.users}">Accounts</span>
        </a>
        
        <a th:href="@{/admin/profile}" class="nav-item" th:classappend="${activePage == 'profile' ? 'active' : ''}">
            <svg style="margin-right: 6px;" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
            <span th:text="#{nav.profile}">Profile</span>
        </a>
    </div>
</nav>
