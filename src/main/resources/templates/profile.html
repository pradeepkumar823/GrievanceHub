<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | GrievanceHub</title>
    <!-- Google Fonts line -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B6B;
            --primary-hover: #ff4d4d;
            --bg-color: #0f172a; 
            --card-bg: rgba(30, 41, 59, 0.75); 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            background-image: linear-gradient(135deg, rgba(15,23,42, 0.8) 0%, rgba(30,27,75, 0.9) 100%), url('/images/myCompl.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: var(--text-main);
        }
        
        .flex-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 75px);
            padding: 40px 20px;
        }

        .profile-container {
            width: 100%;
            max-width: 650px;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: scale(0.95);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .profile-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(255, 107, 107, 0.1) inset;
            overflow: hidden;
            padding-bottom: 35px;
            position: relative;
        }

        .header-bg {
            height: 160px;
            background: linear-gradient(135deg, #FF6B6B 0%, #8b5cf6 50%, #1e1b4b 100%);
            position: relative;
            overflow: hidden;
        }
        
        .header-bg::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMDUiLz4KPC9zdmc+') repeat;
            opacity: 0.5;
        }

        .avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: -60px auto 20px auto;
            border: 4px solid #1e293b;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.4), inset 0 0 20px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }

        .avatar svg {
            color: var(--primary);
            width: 55px;
            height: 55px;
            filter: drop-shadow(0 0 10px rgba(255, 107, 107, 0.5));
        }

        .profile-name {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffffff;
            text-align: center;
            margin-bottom: 5px;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .role-wrapper {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.15), rgba(139, 92, 246, 0.15));
            color: #fca5a5;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border: 1px solid rgba(255, 107, 107, 0.2);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.1);
        }

        .role-badge.officer {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(56, 189, 248, 0.15));
            color: #c084fc;
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.1);
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            padding: 0 40px 30px 40px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
        }
        
        .info-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        .info-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: rgba(255, 107, 107, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fca5a5;
        }
        
        .info-icon.officer-icon {
            background: rgba(139, 92, 246, 0.1);
            color: #c084fc;
        }

        .info-content {
            flex: 1;
        }

        .info-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #94a3b8;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 1.1rem;
            color: #f8fafc;
            font-weight: 500;
        }

        .nav-links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 0 40px;
        }
        
        .btn-full {
            grid-column: 1 / -1;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px 20px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
        }

        .btn-home {
            background: rgba(255, 255, 255, 0.05);
            color: #f8fafc;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-home:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn-admin {
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.4);
            border: 1px solid #8b5cf6;
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(139, 92, 246, 0.6);
            border-color: #a78bfa;
        }

        .btn-logout {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-logout:hover {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(239, 68, 68, 0.5);
            border-color: #ef4444;
        }

    </style>
</head>
<body>
<div th:replace="~{fragments/user-navbar :: navbar(activePage='profile')}"></div>

<div class="flex-wrapper">
    <div class="profile-container">
    <div class="profile-card">
        
        <div class="header-bg"></div>
        
        <div class="avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>

        <!-- Name -->
        <h2 class="profile-name" th:text="${userProfile != null ? userProfile.name : (username != null ? username : 'Guest Account')}">User Name</h2>
        
        <!-- Badges -->
        <div class="role-wrapper">
            <div th:if="${userType == 'OFFICER'}" class="role-badge officer">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                NODAL OFFICER
            </div>
            <div th:if="${userType == 'CITIZEN' or userType == null}" class="role-badge">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                VERIFIED CITIZEN
            </div>
        </div>

        <!-- Info Grid -->
        <div class="info-grid">
            
            <div class="info-card">
                <div class="info-icon" th:classappend="${userType == 'OFFICER' ? 'officer-icon' : ''}">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                </div>
                <div class="info-content">
                    <div class="info-label">Email Address</div>
                    <div class="info-value" th:text="${userProfile != null ? userProfile.email : 'Not Available'}">user@example.com</div>
                </div>
            </div>

            <div class="info-card">
                <div class="info-icon" th:classappend="${userType == 'OFFICER' ? 'officer-icon' : ''}">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </div>
                <div class="info-content">
                    <div class="info-label">Mobile Number</div>
                    <div class="info-value" th:text="${userProfile != null and userProfile.mobileNumber != null and !userProfile.mobileNumber.isEmpty() ? userProfile.mobileNumber : 'Not Provided'}">+91 9999999999</div>
                </div>
            </div>

            <div class="info-card" th:if="${userType == 'OFFICER'}">
                <div class="info-icon officer-icon">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                </div>
                <div class="info-content">
                    <div class="info-label">Assigned Department</div>
                    <div class="info-value" th:text="${userProfile.department}">Operations</div>
                </div>
            </div>

        </div>

        <!-- Buttons -->
        <div class="nav-links">
            <a th:href="@{/home}" class="btn btn-home" th:classappend="${userProfile != null and userProfile.role == 'ADMIN' ? '' : 'btn-full'}">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Return to Home
            </a>

            <!-- Show only if admin -->
            <a th:if="${userProfile != null and userProfile.role == 'ADMIN'}" th:href="@{/admin/dashboard}" class="btn btn-admin">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                Admin Center
            </a>

            <form th:action="@{/logout}" method="post" class="btn-full" style="margin:0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-logout btn-full">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Sign Out / Disconnect
                </button>
            </form>
        </div>
        
    </div>
</div>

</body>
</html>
