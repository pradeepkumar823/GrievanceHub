databases:
  - name: grievancehub-db
    databaseName: grievancehub
    plan: free

services:
  - type: web
    name: grievancehub
    env: docker
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: SPRING_DATASOURCE_HOST
        fromDatabase:
          name: grievancehub-db
          property: host
      - key: SPRING_DATASOURCE_PORT
        fromDatabase:
          name: grievancehub-db
          property: port
      - key: SPRING_DATASOURCE_DATABASE
        fromDatabase:
          name: grievancehub-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: grievancehub-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: grievancehub-db
          property: password
      - key: UPLOAD_DIR
        value: /app/uploads
